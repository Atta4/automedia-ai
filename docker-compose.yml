version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: automedia_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: automedia_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── App Services ────────────────────────────────
  api:
    build: .
    container_name: automedia_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
      - ./output:/app/output
      - ./temp:/app/temp
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker:
    build: .
    container_name: automedia_worker
    command: celery -A workers.tasks worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - .:/app
      - ./output:/app/output
      - ./temp:/app/temp
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  beat:
    build: .
    container_name: automedia_beat
    command: celery -A workers.tasks beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  flower:
    build: .
    container_name: automedia_flower
    command: celery -A workers.tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  mongo_data:
